project_root: "."
image_dir: "data/raw/swimming_pools"
output_dir: "reports/cv_debug"

dev_sample_per_class: 50
image_size: 224
batch_size: 8
num_workers: 0
seed: 42

use_improved_augmentation: true
improved_resize_padding: 16
improved_rotation_degrees: 10.0

baseline_epochs: 2
improved_epochs: 2
learning_rate: 0.001
improved_learning_rate: 0.0003
weight_decay: 0.0001

val_size: 0.15
test_size: 0.15

baseline_dropout: 0.2
improved_dropout: 0.2
baseline_freeze_backbone: true
improved_freeze_backbone: false

threshold_min: 0.20
threshold_max: 0.80
threshold_step: 0.10

max_error_examples: 8
report_title: "Swimming Pool Classification Debug Report"
early_stopping_patience: 1
min_delta: 0.0001
